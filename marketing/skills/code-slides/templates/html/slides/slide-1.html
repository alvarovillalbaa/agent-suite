<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: "IBM Plex Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      body {
        display: grid;
        place-items: center;
        padding: 2rem;
        color: #11203d;
        background: linear-gradient(120deg, #fefefe 0%, #deecff 100%);
      }

      article {
        width: min(60rem, 100%);
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #d3dcee;
        border-radius: 1rem;
        padding: 1.8rem;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 5vw, 3.2rem);
      }

      p {
        margin: 0;
        max-width: 60ch;
        color: #243552;
        font-size: clamp(1rem, 2vw, 1.3rem);
      }
    </style>
  </head>
  <body>
    <article>
      <h1>__DECK_TITLE__</h1>
      <p>
        Build responsive, code-first presentations with remote control support and configurable navigation.
      </p>
    </article>
  </body>
</html>
