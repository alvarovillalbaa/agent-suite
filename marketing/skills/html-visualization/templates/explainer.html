<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__TITLE__</title>
  <style>
    :root {
      --bg: __BG__;
      --panel: __PANEL__;
      --text: __TEXT__;
      --muted: __MUTED__;
      --accent: __ACCENT__;
      --border: __BORDER__;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, rgba(255,255,255,0.06), transparent 30%), var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 20px 64px;
    }

    .hero {
      display: grid;
      gap: 14px;
      padding: 28px;
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 24px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 0.95;
    }

    .subtitle {
      color: var(--muted);
      max-width: 68ch;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      border-radius: 20px;
      padding: 18px;
    }

    .sections {
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    .section {
      border: 1px solid var(--border);
      background: var(--panel);
      border-radius: 20px;
      padding: 24px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">Visualizer / Explainer</div>
      <h1>__TITLE__</h1>
      <div class="subtitle">__SUBTITLE__</div>
      <div class="grid">__SUMMARY_CARDS__</div>
    </section>
    <section class="sections">__SECTIONS__</section>
    <div class="footer">Generated __TIMESTAMP__</div>
  </main>
</body>
</html>
