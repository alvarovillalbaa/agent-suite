<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>__TITLE__</title>
  <style>
    :root {
      --bg: __BG__;
      --panel: __PANEL__;
      --panel-strong: color-mix(in srgb, var(--panel) 86%, white 14%);
      --text: __TEXT__;
      --muted: __MUTED__;
      --accent: __ACCENT__;
      --border: __BORDER__;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      --heading-font: "Bricolage Grotesque", "Avenir Next", "Segoe UI", sans-serif;
      --body-font: "IBM Plex Sans", "Segoe UI", sans-serif;
      --mono-font: "IBM Plex Mono", "SFMono-Regular", monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--body-font);
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.08), transparent 28%),
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px),
        var(--bg);
      background-size: auto, 28px 28px, 28px 28px, auto;
      color: var(--text);
    }

    .page {
      max-width: 1180px;
      margin: 0 auto;
      padding: 40px 20px 64px;
    }

    .hero {
      display: grid;
      gap: 14px;
      padding: 28px;
      border: 1px solid var(--border);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 12%, transparent), transparent 48%),
        var(--panel);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: var(--mono-font);
    }

    h1 {
      margin: 0;
      font-family: var(--heading-font);
      font-size: clamp(2.2rem, 5vw, 4.5rem);
      line-height: 0.95;
      max-width: 12ch;
    }

    .subtitle {
      color: var(--muted);
      max-width: 68ch;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .card {
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--panel) 88%, white 12%);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    }

    .card strong {
      display: inline-block;
      font-family: var(--mono-font);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .card > div {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .sections {
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    .section {
      border: 1px solid var(--border);
      background: var(--panel-strong);
      border-radius: 20px;
      padding: 24px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
      font-family: var(--heading-font);
    }

    .section p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .footer {
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.9rem;
      font-family: var(--mono-font);
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">Visualizer / Explainer</div>
      <h1>__TITLE__</h1>
      <div class="subtitle">__SUBTITLE__</div>
      <div class="grid">__SUMMARY_CARDS__</div>
    </section>
    <section class="sections">__SECTIONS__</section>
    <div class="footer">Generated __TIMESTAMP__</div>
  </main>
</body>
</html>
