name: Publish skills to public repos

on:
  push:
    branches: [main]
    paths:
      - "skills/**"
      - "public/**"
      - "publish_targets.yml"
      - ".github/workflows/publish_skills.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Publish skills that differ from targets
        env:
          TOKEN: ${{ secrets.SKILL_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE}"

          # guard: never run without token
          [ -n "${TOKEN:-}" ] || (echo "Missing SKILL_PUBLISH_TOKEN" && exit 1)

          SKILLS=$(yq -r '.skills | keys[]' "${ROOT}/publish_targets.yml")

          if [ -z "${SKILLS:-}" ]; then
            echo "No skills configured in publish_targets.yml"
            exit 0
          fi

          for SKILL in $SKILLS; do
            DEST_REPO=$(yq -r ".skills.${SKILL}.repo" "${ROOT}/publish_targets.yml")

            if [ "$DEST_REPO" = "null" ] || [ -z "$DEST_REPO" ]; then
              echo "No target repo configured for skill: $SKILL. Skipping."
              continue
            fi

            echo "Publishing $SKILL -> $DEST_REPO"

            rm -rf /tmp/mirror
            git clone "https://x-access-token:${TOKEN}@github.com/${DEST_REPO}.git" /tmp/mirror

            # wipe destination (keep .git)
            find /tmp/mirror -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

            # copy skill contents to repo root (--exclude .git: rsync --delete would
            # otherwise remove the clone metadata; find already kept .git, but rsync
            # still prunes paths not present in the source tree)
            rsync -av --delete --exclude='.git/' "${ROOT}/skills/${SKILL}/" /tmp/mirror/

            # add shared public files if you want
            if [ -f "${ROOT}/public/LICENSE" ]; then cp "${ROOT}/public/LICENSE" /tmp/mirror/LICENSE; fi
            if [ -f "${ROOT}/public/CONTRIBUTING.md" ]; then cp "${ROOT}/public/CONTRIBUTING.md" /tmp/mirror/CONTRIBUTING.md; fi

            # commit & push (stay in ROOT: never cd into /tmp/mirror or rm -rf breaks the shell cwd)
            git -C /tmp/mirror config user.name "github-actions[bot]"
            git -C /tmp/mirror config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git -C /tmp/mirror add -A

            if git -C /tmp/mirror diff --cached --quiet; then
              echo "No changes for $SKILL"
              continue
            fi

            git -C /tmp/mirror commit -m "Publish ${SKILL} from agent-suite"
            git -C /tmp/mirror push origin HEAD:main
          done