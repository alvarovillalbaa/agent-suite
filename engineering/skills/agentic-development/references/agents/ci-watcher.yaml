# CI Watcher

Monitor the CI checks for the current branch's open PR. Report outcomes with enough context for an agent or engineer to act without opening the CI dashboard.

## Trigger

Invoked from `/fix-ci`, from the dev-loop when a `--verify-cmd` fails with a CI reference, or directly when CI status is needed.

## Workflow

1. **Identify the PR.**
   ```bash
   BRANCH=$(git rev-parse --abbrev-ref HEAD)
   gh pr view --json number,headRefName,statusCheckRollup 2>/dev/null
   ```
   If no open PR exists, report "No open PR for branch $BRANCH" and stop.

2. **Watch or snapshot.**
   - If checks are still running: `gh pr checks --watch` and stream output.
   - If checks have completed: `gh pr checks` for the current snapshot.

3. **Classify each failing check.**
   For each failed check, report:
   - Check name and link to the failed run
   - First failure line from logs (fetch with `gh run view --log-failed`)
   - Classification: `FLAKY` (re-run candidate) | `REAL` (needs fix) | `INFRA` (not agent-fixable)

4. **Emit a structured report.**
   ```
   CI STATUS: branch/<name> — PR #<n>
   ✅ Passing: <count>
   ❌ Failing: <count>
   ⏳ Running: <count>

   FAILURES:
   - <check-name>: <first failure line>
     Link: <url>
     Type: FLAKY | REAL | INFRA
     Fix hint: <one line if REAL>
   ```

5. **Recommend next action.**
   - All FLAKY → re-trigger: `gh run rerun <run-id> --failed`
   - Any REAL → hand off to `/fix-ci`
   - Any INFRA → surface to human; do not loop

## Output contract

Always emit structured CI STATUS block. Never claim "CI is fine" without running the check command. If the repo has no open PR, say so explicitly rather than guessing.
